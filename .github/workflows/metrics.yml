name: Profile metrics

# Generates static SVG stat cards and commits them to the repo, so the
# profile README never depends on a rate-limited third-party service.
# Requires a repo secret METRICS_TOKEN (classic PAT, no scopes needed for
# public data; add read:org for organization metrics).

on:
  schedule:
    - cron: "0 3 * * *" # daily, 05:00 Cairo time
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: true

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: General stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MegumiinUwU
          filename: metrics/general.svg
          committer_message: "chore: update profile metrics"
          template: classic
          base: header, activity, community, repositories
          repositories_affiliations: owner, collaborator, organization_member
          config_display: large
          config_timezone: Africa/Cairo
          extras_css: |
            svg { background: #141321; border-radius: 10px; }
            * { color: #a9fef7 !important; }
            h1, h2, h1 *, h2 * { color: #fe428e !important; }
            footer, footer * { color: #6f6f8d !important; }

      - name: Most used languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MegumiinUwU
          filename: metrics/languages.svg
          committer_message: "chore: update profile metrics"
          template: classic
          base: ""
          config_timezone: Africa/Cairo
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          extras_css: |
            svg { background: #141321; border-radius: 10px; }
            * { color: #a9fef7 !important; }
            h1, h2, h1 *, h2 * { color: #fe428e !important; }
            footer, footer * { color: #6f6f8d !important; }

      # The habits plugin is broken upstream: GitHub's events API no longer
      # includes commit payloads, and lowlighter/metrics is unmaintained.
      # This card shows issue/PR follow-up stats and notable contributions
      # (orgs and repos contributed to) instead.
      - name: Contributions
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MegumiinUwU
          filename: metrics/contributions.svg
          committer_message: "chore: update profile metrics"
          template: classic
          base: ""
          config_timezone: Africa/Cairo
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_notable: yes
          plugin_notable_from: all
          extras_css: |
            svg { background: #141321; border-radius: 10px; }
            * { color: #a9fef7 !important; }
            h1, h2, h1 *, h2 * { color: #fe428e !important; }
            footer, footer * { color: #6f6f8d !important; }

      - name: Isometric contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MegumiinUwU
          filename: metrics/isocalendar.svg
          committer_message: "chore: update profile metrics"
          template: classic
          base: ""
          config_display: large
          config_timezone: Africa/Cairo
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          extras_css: |
            svg { background: #141321; border-radius: 10px; }
            * { color: #a9fef7 !important; }
            h1, h2, h1 *, h2 * { color: #fe428e !important; }
            footer, footer * { color: #6f6f8d !important; }
